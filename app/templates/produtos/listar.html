{% extends "base.html" %}

{% block content %}
    
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="h3 text-secondary">
            <i class="bi bi-box-seam"></i> Controle de Produtos
        </h2>
        <a {# href="{{url_for('web.novo_produto_view')}}" #} class="btn btn-warning shadow-sm fw-semibold">
            <i class="bi bi-plus-lg"></i> Inserir Produto
        </a>
    </div>

    <div class="card shadow border-0">
        <div class="card-body p-0">

            <table class="table table-hover table-striped mb-0 text-center align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Nome do produto</th>
                        <th>Preço Unitário</th>
                        <th>Categoria Associada</th>
                        <th>Ações</th>
                    </tr>
                </thead>
            </table>

        </div>
    </div>

{% endblock %}
